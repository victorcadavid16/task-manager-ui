<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Página de Calificaciones</title>
  <link rel="stylesheet" href="registro.css">
</head>
<body>
  <div class="container">
    <form class="registro-form">
      <h1>Registro de Usuario</h1>
      
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
      
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
      
      <label for="usuario">Nombre de usuario</label>
      <input type="text" id="usuario" name="usuario" placeholder="Usuario único" required>
      
      <label for="contraseña">Contraseña</label>
      <input type="password" id="contraseña" name="contraseña" placeholder="********" required>
      
      <label for="confirmar">Confirmar contraseña</label>
      <input type="password" id="confirmar" name="confirmar" placeholder="********" required>
      
      <label for="rol">Rol</label>
      <select id="rol" name="rol" required>
        <option value="">Selecciona tu rol</option>
        <option value="estudiante">Estudiante</option>
        <option value="profesor">Profesor</option>
        <option value="administrador">Administrador</option>
      </select>
      
      <button type="submit">Registrarse</button>
      <a href="dashboard.html" class="btn-volver">← Volver</a>
      <p class="login-link">¿Ya tienes cuenta? <a href="#">Inicia sesión aquí</a></p>
    </form>
  </div>
</body>
</html>
