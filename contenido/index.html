<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso a Task App</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
    <div class="login" id="login">
        <h2>Ingreso de Usuarios</h2>
            <p class="sub">Bienvenido a Task App</p>

                <form action="dashboard.html" method="get">
                <label for="usuario">Correo electronico</label>
                <input type="email" id="usuario" placeholder="Ingresa tu correo" required>

                <label for="clave">Contraseña</label>
                <input type="password" id="clave" placeholder="Ingresa tu contraseña" required>

                <button type="submit" class="btn-login">Ingresar</button>
                <p class="registro">¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
                <p class="registro"><a href="#portada">← Volver</a></p>
            </form>
 </div>
</body>
</html>
